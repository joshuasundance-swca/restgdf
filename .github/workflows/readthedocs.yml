name: readthedocs

on:
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/**"
      - "restgdf/**"
      - "tests/**"
      - "docs/**"
      - "readthedocs.yaml"
      - "pyproject.toml"

jobs:
  readthedocs:
    if: "!contains(github.event.head_commit.message, 'Bump version')"
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        token: ${{ secrets.WORKFLOW_GIT_ACCESS_TOKEN }}
        fetch-depth: 0
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: "3.14"
        cache: pip
    - name: Install Python libraries
      run: |
        python -m pip install --upgrade pip
        python -m pip install --user -e . -r docs/requirements.txt
    - name: "Update docs"
      working-directory: docs
      run: |
        make clean html
    - name: Commit changes
      with:
        COMMIT_MESSAGE: "Update doc files"
      uses: stefanzweifel/git-auto-commit-action@v7
