name: pytest

on:
  pull_request:
    branches: ["main"]
    types:
      - opened
      - synchronize
      - reopened
    paths:
      - ".github/workflows/**"
      - "restgdf/**"
      - "tests/**"
      - "docs/**"
      - "readthedocs.yaml"
      - "pyproject.toml"
      - ".pre-commit-config.yaml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: pre-commit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: pyproject.toml
      - uses: pre-commit/action@v3.0.1

  test:
    name: pytest (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install package with dev extras
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]
      - name: Run tests
        run: python -m pytest -q -m "not network"

  network:
    name: pytest-network
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install package with dev extras
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]
      - name: Run live network tests
        run: python -m pytest -q -m network --run-network

  docs:
    name: docs (strict)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install package with doc extras
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[doc]
      - name: Build docs (nitpicky, warnings as errors)
        run: python -m sphinx -n -W --keep-going -b html docs docs/_build/html
      - name: Upload built docs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: docs-html
          path: docs/_build/html
          if-no-files-found: error

  ci:
    name: ci
    if: always()
    needs: [lint, test, network, docs]
    runs-on: ubuntu-latest
    steps:
      - name: Aggregate job results
        run: |
          if [ "${{ needs.lint.result }}" != "success" ] || [ "${{ needs.test.result }}" != "success" ] || [ "${{ needs.network.result }}" != "success" ] || [ "${{ needs.docs.result }}" != "success" ]; then
            echo "One or more required jobs failed: lint=${{ needs.lint.result }} test=${{ needs.test.result }} network=${{ needs.network.result }} docs=${{ needs.docs.result }}"
            exit 1
          fi
          echo "All required jobs succeeded."
