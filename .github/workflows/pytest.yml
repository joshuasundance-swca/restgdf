name: pytest

on:
  pull_request:
    branches: ["main"]
    types:
      - opened
      - synchronize
      - reopened
    paths:
      - ".github/workflows/**"
      - "restgdf/**"
      - "tests/**"
      - "docs/**"
      - "readthedocs.yaml"
      - "pyproject.toml"
      - ".pre-commit-config.yaml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: pre-commit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: pyproject.toml
      - uses: pre-commit/action@2c7b3805fd2a0fd8c1884dcaebf91fc102a13ecd # v3.0.1

  test:
    name: pytest (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install package with all test extras
        # Full non-network suite imports from resilience + telemetry
        # modules; install every extra so coverage matches local dev.
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,geo,resilience,telemetry]"
      - name: Run tests
        run: python -m pytest -q -m "not network"

  install_combinations:
    name: install-${{ matrix.label }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: base
            extras: ""
          - label: geo
            extras: "[geo]"
          - label: resilience
            extras: "[resilience]"
          - label: telemetry
            extras: "[telemetry]"
          - label: geo-resilience-telemetry
            extras: "[geo,resilience,telemetry]"
          - label: dev
            extras: "[dev]"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install package (extras=${{ matrix.label }})
        run: |
          python -m pip install --upgrade pip
          python -m pip install ".${{ matrix.extras }}"
      - name: Import smoke test
        run: python -c "import restgdf; print(restgdf.__version__)"
      - name: Check dependency consistency
        run: python -m pip check

  base_install:
    name: pytest-base-install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install package with dev extras only
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Run no-geo contract tests
        run: |
          python -m pytest -q \
            tests/test_lazy_imports.py \
            tests/test_public_api.py \
            tests/test_models_queries.py \
            tests/test_base_install.py \
            tests/test_minimal_install.py \
            tests/test_featurelayer_get_df_base_install.py

  network:
    name: pytest-network
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install package with all test extras
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,geo,resilience,telemetry]"
      - name: Run live network tests
        run: python -m pytest -q -m network --run-network

  stress:
    name: pytest-stress
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install package with all test extras
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,geo,resilience,telemetry]"
      - name: Run stress tests
        run: python -m pytest -q -m stress --run-stress

  docs:
    name: docs (strict)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install package with doc extras
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . -r docs/requirements.txt
      - name: Build docs (nitpicky, warnings as errors)
        run: python -m sphinx -n -W --keep-going -b html docs docs/_build/html
      - name: Upload built docs
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: docs-html
          path: docs/_build/html
          if-no-files-found: error

  ci:
    name: ci
    if: always()
    needs: [lint, test, install_combinations, base_install, network, stress, docs]
    runs-on: ubuntu-latest
    steps:
      - name: Aggregate job results
        run: |
          if [ "${{ needs.lint.result }}" != "success" ] || [ "${{ needs.test.result }}" != "success" ] || [ "${{ needs.install_combinations.result }}" != "success" ] || [ "${{ needs.base_install.result }}" != "success" ] || [ "${{ needs.network.result }}" != "success" ] || [ "${{ needs.stress.result }}" != "success" ] || [ "${{ needs.docs.result }}" != "success" ]; then
            echo "One or more required jobs failed: lint=${{ needs.lint.result }} test=${{ needs.test.result }} install-combinations=${{ needs.install_combinations.result }} base-install=${{ needs.base_install.result }} network=${{ needs.network.result }} stress=${{ needs.stress.result }} docs=${{ needs.docs.result }}"
            exit 1
          fi
          echo "All required jobs succeeded."
