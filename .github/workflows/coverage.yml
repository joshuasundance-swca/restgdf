name: coverage

on:
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/**"
      - "restgdf/**"
      - "tests/**"
      - "requirements.txt"
  workflow_dispatch:

jobs:
  coverage:
    if: "!contains(github.event.head_commit.message, 'Bump version')"
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        token: ${{ secrets.WORKFLOW_GIT_ACCESS_TOKEN }}
        fetch-depth: 0
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: "3.14"
        cache: pip
    - name: Install Python libraries
      run: |
        pip install --user -r requirements.txt "setuptools>=61" ".[dev]"
    - name: "Run coverage"
      run: |
        coverage run
        coverage report -m --format=markdown > COVERAGE.md
        coverage html
        coverage json -o coverage.json
        python .github/scripts/generate_coverage_badge.py coverage.json coverage.svg
        rm -f coverage.json
    - name: Commit changes
      with:
        COMMIT_MESSAGE: "Update coverage"
      uses: stefanzweifel/git-auto-commit-action@v7
