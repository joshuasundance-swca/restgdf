name: Bump Version

on:
  workflow_dispatch:
    inputs:
      bump:
        type: choice
        description: 'Bump major, minor, or patch version'
        required: true
        default: 'patch'
        options:
        - 'major'
        - 'minor'
        - 'patch'

jobs:
  bump-version:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        token: ${{ secrets.WORKFLOW_GIT_ACCESS_TOKEN }}
        fetch-depth: 0
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: "3.14"
        cache: pip
    - name: Install Python libraries
      run: |
        pip install --user bumpver
    - name: git config
      run: |
        git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
    - name: Bump version (commit + tag, no push)
      run: bumpver update --commit --tag-commit --${{ github.event.inputs.bump }} --no-push
    - name: Install project with dev extras
      # BL-42: pre-tag pytest safety — install the just-bumped commit
      # so the test run below executes against the exact source tree
      # that will be published.
      run: |
        python -m pip install --upgrade pip
        python -m pip install -e ".[dev,geo,resilience,telemetry]"
    - name: Run offline test suite on the to-be-tagged commit
      # BL-42: if any test fails, abort BEFORE pushing the tag so a
      # broken commit never makes it onto the release branch.
      run: python -m pytest -q -m "not network"
    - name: Push commit and tag
      run: |
        git push
        git push --tags
